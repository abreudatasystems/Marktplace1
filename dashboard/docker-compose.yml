services:
  dashboard:
    image: ghcr.io/saleor/saleor-dashboard:3.23
    restart: unless-stopped
    ports:
      - "9000:80"
    environment:
      - API_URL=${API_URL:-http://localhost:8000/graphql/}
      - APP_MOUNT_URI=/
      - LOCALE_CODE=EN

